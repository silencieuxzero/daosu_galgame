# ==================== 插件基础配置 ====================
[plugin]
# 是否启用插件
enabled = true
# 配置版本号
config_version = "1.0.1"

# ==================== 数据路径配置 ====================
[data]
# 角色数据与事件数据目录（相对项目根）
data_dir = "plugins/daosu_galgame/data"
# 存档文件存放目录
save_dir = "plugins/daosu_galgame/data/saves"

# ==================== 新手引导配置 ====================
[tutorial]
# 是否启用新手引导
enabled = true
# 引导对话脚本 ID
script_id = "tutorial_intro"

# ==================== 好感度参数配置 ====================
[affection]
# 新角色初始好感度
initial_value = 0
# 好感度上限
max_value = 100
# 好感度下限
min_value = -100

# ==================== 存档参数配置 ====================
[save]
# 最大存档槽位数
max_slots = 20

# ==================== 合并转发消息配置 ====================
[forward]
# 是否启用合并转发（启用后每条消息包装为单个转发节点发送）
enabled = true
# 机器人显示名称
bot_name = "悼溯茶馆"
